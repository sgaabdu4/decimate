name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  RUST_TOOLCHAIN: stable

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  build-assets:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: dart-decimate-linux-x64.tar.gz
            exe_ext: ""
          - os: macos-15-intel
            target: x86_64-apple-darwin
            asset: dart-decimate-darwin-x64.tar.gz
            exe_ext: ""
          - os: macos-14
            target: aarch64-apple-darwin
            asset: dart-decimate-darwin-arm64.tar.gz
            exe_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: dart-decimate-windows-x64.tar.gz
            exe_ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"
          rustup target add "${{ matrix.target }}"

      - name: Build archive
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --locked --target "${{ matrix.target }}" --bin dart-decimate --bin dart-decimate-mcp
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/dart-decimate${{ matrix.exe_ext }}" dist/
          cp "target/${{ matrix.target }}/release/dart-decimate-mcp${{ matrix.exe_ext }}" dist/
          if [ "${{ matrix.exe_ext }}" = "" ]; then
            chmod +x dist/dart-decimate dist/dart-decimate-mcp
          fi
          tar -czf "${{ matrix.asset }}" -C dist .

      - name: Upload archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Tag and publish
    needs: build-assets
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component clippy,rustfmt
          rustup default "$RUST_TOOLCHAIN"

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Prepare trusted npm publishing
        run: |
          npmrc="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          if [ -f "$npmrc" ]; then
            sed -i '/_authToken/d' "$npmrc"
          fi

      - name: Validate release candidate
        run: |
          npm run version:check
          npm run migration:check
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test --all-targets
          npm run pack:check
          npm run test:postinstall:prebuilt
          npm run test:npx:prebuilt

      - name: Download release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release-assets

      - name: Flatten release assets
        run: |
          mkdir -p dist-assets
          find release-assets -type f -name 'dart-decimate-*' -exec cp {} dist-assets/ \;
          test "$(find dist-assets -type f | wc -l)" -eq 4
          ls -la dist-assets

      - name: Resolve version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check existing release state
        id: state
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

          if npm view "dart-decimate@$VERSION" version >/dev/null 2>&1; then
            echo "npm_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "npm_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.state.outputs.tag_exists == 'false'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist-assets/* --clobber
          else
            gh release create "$TAG" dist-assets/* --title "$TAG" --notes "Dart Decimate $VERSION"
          fi

      - name: Publish to npm
        if: steps.state.outputs.npm_exists == 'false'
        run: npm publish --access public --provenance
