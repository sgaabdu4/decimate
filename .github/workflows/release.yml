name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  RUST_TOOLCHAIN: stable

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Tag and publish
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component clippy,rustfmt
          rustup default "$RUST_TOOLCHAIN"

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Prepare trusted npm publishing
        run: |
          npmrc="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          if [ -f "$npmrc" ]; then
            sed -i '/_authToken/d' "$npmrc"
          fi

      - name: Validate release candidate
        run: |
          npm run version:check
          npm run migration:check
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test --all-targets
          npm run pack:check

      - name: Resolve version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check existing release state
        id: state
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

          if npm view "dart-decimate@$VERSION" version >/dev/null 2>&1; then
            echo "npm_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "npm_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.state.outputs.npm_exists == 'false'
        run: npm publish --access public --provenance

      - name: Create and push tag
        if: steps.state.outputs.tag_exists == 'false'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
          else
            gh release create "$TAG" --title "$TAG" --notes "Dart Decimate $VERSION"
          fi
