name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Rust and npm checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install 1.85.0 --profile minimal --component clippy,rustfmt
          rustup default 1.85.0

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check version and migration guards
        run: |
          npm run version:check
          npm run migration:check

      - name: Check release version
        if: github.event_name == 'pull_request'
        run: npm run release:check

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all-targets

      - name: Check npm package
        run: |
          npm run pack:check
          npm run test:npx:local
          npm run test:npx:mcp:local
